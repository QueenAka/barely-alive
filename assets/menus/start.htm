<style>
  .startMenu {
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    color: white;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 99999999999999999999999999999999;
  }
  
  .startMenu .title {
    font-family: "Bubble", monospace;
    font-size: 30px;
    width: 100%;
    text-align: center;
  }

  .startMenu .content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 350px;
    height: 500px;
  }

  .startMenu .content button {
    width: 100%;
    background: transparent;
    color: white;
    padding: 5px;
    font-size: 20px;
    font-family: "Bubble", monospace;
    border: none;
    margin: 5px;
  }

  .startMenu .content button:hover {
    animation: spin 1s infinite;
    transform: scale(1.05);
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg) scale(1.1);
      font-weight: bold;
    }

    25% {
      transform: rotate(3deg) scale(1.1);
      font-weight: bold;
    }

    50% {
      transform: rotate(0deg) scale(1.1);
      font-weight: bold;
    }

    75% {
      transform: rotate(-3deg) scale(1.1);
      font-weight: bold;
    }

    100% {
      transform: rotate(0deg) scale(1.1);
      font-weight: bold;
    }
  }

  @font-face {
    font-family: 'Bubble';
    src: url('assets/misc/bubble.ttf');
  }
</style>
<div class="startMenu">
  <div class="content">
    <div class="title">Barely Alive</div>
    <button onclick="PLAY()">PLAY</button>
    <button>SETTINGS</button>
  </div>
</div>
